<!DOCTYPE>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho Digital - Sustentabilidade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌾 Agrinho Digital</h1>
    <div class="subtitle">Calculadora de Sustentabilidade Agrícola</div>

    <div class="form-group">
        <label for="aguaAplicada">Água aplicada na irrigação (Litros):</label>
        <input type="number" id="aguaAplicada" placeholder="Ex: 1000" min="0">
    </div>

    <div class="form-group">
        <label for="aguaUtilizada">Água aproveitada pela cultura (Litros):</label>
        <input type="number" id="aguaUtilizada" placeholder="Ex: 800" min="0">
    </div>

    <div class="form-group">
        <label for="diesel">Diesel gasto nos tratores (Litros):</label>
        <input type="number" id="diesel" placeholder="Ex: 50" min="0">
    </div>

    <div class="form-group">
        <label for="fertilizante">Fertilizantes nitrogenados (Kg):</label>
        <input type="number" id="fertilizante" placeholder="Ex: 20" min="0">
    </div>

    <button onclick="calcularSustentabilidade()">Gerar Diagnóstico</button>

    <div id="resultadoBox" class="resultado">
        <h2>📊 Relatório de Impacto</h2>
        <p><strong>Eficiência Hídrica:</strong> <span id="resAgua">0</span>%</p>
        <div id="badgeAgua" class="status-badge"></div>
        
        <p style="margin-top: 15px;"><strong>Pegada de Carbono:</strong> <span id="resCarbono">0</span> kg de CO₂</p>
        <div class="dica">
            <strong>Dica Agrinho:</strong> <span id="resDica"></span>
        </div>
    </div>
</div>

<script src="script.js"></script>
    
</body>
    
</html>
